version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: datg_analyzer
      POSTGRES_USER: datg_user
      POSTGRES_PASSWORD: datg_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datg_user -d datg_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (pour Celery, optionnel)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://datg_user:datg_password@postgres:5432/datg_analyzer
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend Streamlit
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    environment:
      BACKEND_URL: http://backend:8000
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_started

  # Worker Celery (pour tâches asynchrones)
  celery-worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://datg_user:datg_password@postgres:5432/datg_analyzer
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core.tasks worker --loglevel=info

  # Flower (monitoring Celery)
  flower:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    command: celery -A core.tasks flower --port=5555

  # Nginx (reverse proxy, optionnel)
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads: